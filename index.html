<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lumi Derm Aesthetics Website Preview</title>
    <meta name="description" content="Website preview for Lumi Derm Aesthetics.">
    <meta http-equiv="refresh" content="0; url=lumi-derm-website/">
    <link rel="canonical" href="https://dimavasiliu.github.io/LumiDerm/lumi-derm-website/">
    <link rel="icon" type="image/png" href="lumi-derm-website/assets/icons/favicon.png">
    <style>
      :root {
        color-scheme: light;
        --ink: #292426;
        --muted: #74696b;
        --rose: #b97b72;
        --line: rgba(112, 83, 84, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 2rem;
        background:
          radial-gradient(circle at 20% 10%, rgba(242, 216, 217, 0.72), transparent 24rem),
          radial-gradient(circle at 90% 20%, rgba(219, 234, 240, 0.78), transparent 22rem),
          #fffdf9;
        color: var(--ink);
        font-family: Inter, Manrope, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 680px);
        padding: clamp(1.4rem, 5vw, 2.4rem);
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 24px 70px rgba(61, 45, 47, 0.12);
        backdrop-filter: blur(18px);
      }

      img {
        width: 64px;
        height: 64px;
        border-radius: 50%;
      }

      h1 {
        margin: 1rem 0 0.5rem;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.2rem, 8vw, 3.4rem);
        line-height: 1;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.4rem;
      }

      a {
        display: inline-flex;
        min-height: 46px;
        align-items: center;
        justify-content: center;
        padding: 0.8rem 1rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--ink);
        font-weight: 800;
        text-decoration: none;
      }

      a.primary {
        color: #fff;
        background: var(--rose);
        border-color: transparent;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="lumi-derm-website/assets/icons/lumi-derm-logo.png" alt="Lumi Derm Aesthetics logo">
      <h1>Lumi Derm Aesthetics</h1>
      <p>Redirecting to the website preview. If it does not open automatically, use the button below.</p>
      <div class="actions">
        <a class="primary" href="lumi-derm-website/">Open Website</a>
        <a href="lumi-derm-website/pages/services.html">Treatments</a>
        <a href="lumi-derm-website/pages/contact.html">Contact</a>
      </div>
    </main>
    <script>
      window.location.replace("lumi-derm-website/");
    </script>
  </body>
</html>
